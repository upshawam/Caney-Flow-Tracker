name: Update Center Hill Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'
    - cron: '5 * * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static schedule JSON
        run: npm run scrape:schedule

      - name: Commit updated schedule
        run: |
          if git diff --quiet -- public/data/schedule.json; then
            echo "No schedule changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/schedule.json
          git commit -m "chore: update Center Hill schedule"
          git push